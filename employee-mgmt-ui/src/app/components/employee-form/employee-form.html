<div
  style="
    max-width: 560px;
    margin: 40px auto;
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 4px 24px -2px rgba(15, 23, 42, 0.06);
    border: 1px solid #e2e8f0;
    animation: slideUp 0.4s ease-out;
    font-family: 'Inter', sans-serif;
  "
>
  <!-- Form Header -->
  <div style="margin-bottom: 32px; text-align: center">
    <div
      style="
        background: #ecfdf5;
        color: #10b981;
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        margin: 0 auto 16px auto;
        font-weight: bold;
      "
    >
      👤
    </div>
    <h2
      style="font-size: 24px; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.5px"
    >
      Onboard New Employee
    </h2>
    <p style="margin: 6px 0 0 0; font-size: 14px; color: #64748b">
      Fill in the profile matrix parameters to trigger system synchronization.
    </p>
  </div>

  <!-- Global Server Collision Error Block -->
  <div
    *ngIf="globalErrorMessage"
    style="
      background: #fef2f2;
      color: #991b1b;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 28px;
      font-size: 14px;
      border: 1px solid #fee2e2;
      border-left: 5px solid #ef4444;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    "
  >
    <span>⚠️</span> {{ globalErrorMessage }}
  </div>

  <form (submit)="save()">
    <!-- Full Name Input Group -->
    <div style="margin-bottom: 20px">
      <label
        style="
          display: block;
          font-size: 13px;
          font-weight: 600;
          margin-bottom: 6px;
          color: #334155;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        "
        >Full Name</label
      >
      <input
        type="text"
        [(ngModel)]="emp.name"
        name="name"
        placeholder="e.g. John Doe"
        style="
          width: 100%;
          padding: 11px 16px;
          border: 1px solid #cbd5e1;
          border-radius: 10px;
          font-size: 14px;
          outline: none;
          transition: all 0.2s ease;
          background: #f8fafc;
        "
        [style.border-color]="fieldErrors && fieldErrors.name ? '#ef4444' : '#cbd5e1'"
        [style.box-shadow]="
          fieldErrors && fieldErrors.name ? '0 0 0 3px rgba(239,68,68,0.1)' : 'none'
        "
        onfocus="
          this.style.borderColor = '#3b82f6';
          this.style.background = '#fff';
          this.style.boxShadow = '0 0 0 3px rgba(59,130,246,0.1)';
        "
        onblur="
          if (!this.style.borderColor.includes('239')) {
            this.style.borderColor = '#cbd5e1';
            this.style.background = '#f8fafc';
            this.style.boxShadow = 'none';
          }
        "
      />
      <small
        *ngIf="fieldErrors && fieldErrors.name"
        style="color: #ef4444; display: block; margin-top: 6px; font-size: 13px; font-weight: 600"
      >
        • {{ fieldErrors.name }}
      </small>
    </div>

    <!-- Email Address Input Group -->
    <div style="margin-bottom: 20px">
      <label
        style="
          display: block;
          font-size: 13px;
          font-weight: 600;
          margin-bottom: 6px;
          color: #334155;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        "
        >Email Address</label
      >
      <input
        type="text"
        [(ngModel)]="emp.email"
        name="email"
        placeholder="name@company.com"
        style="
          width: 100%;
          padding: 11px 16px;
          border: 1px solid #cbd5e1;
          border-radius: 10px;
          font-size: 14px;
          outline: none;
          transition: all 0.2s ease;
          background: #f8fafc;
        "
        [style.border-color]="fieldErrors && fieldErrors.email ? '#ef4444' : '#cbd5e1'"
        [style.box-shadow]="
          fieldErrors && fieldErrors.email ? '0 0 0 3px rgba(239,68,68,0.1)' : 'none'
        "
        onfocus="
          this.style.borderColor = '#3b82f6';
          this.style.background = '#fff';
          this.style.boxShadow = '0 0 0 3px rgba(59,130,246,0.1)';
        "
        onblur="
          if (!this.style.borderColor.includes('239')) {
            this.style.borderColor = '#cbd5e1';
            this.style.background = '#f8fafc';
            this.style.boxShadow = 'none';
          }
        "
      />
      <small
        *ngIf="fieldErrors && fieldErrors.email"
        style="color: #ef4444; display: block; margin-top: 6px; font-size: 13px; font-weight: 600"
      >
        • {{ fieldErrors.email }}
      </small>
    </div>

    <!-- Department Input Group -->
    <div style="margin-bottom: 20px">
      <label
        style="
          display: block;
          font-size: 13px;
          font-weight: 600;
          margin-bottom: 6px;
          color: #334155;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        "
        >Department</label
      >
      <input
        type="text"
        [(ngModel)]="emp.department"
        name="department"
        placeholder="e.g. IT, HR, Sales"
        style="
          width: 100%;
          padding: 11px 16px;
          border: 1px solid #cbd5e1;
          border-radius: 10px;
          font-size: 14px;
          outline: none;
          transition: all 0.2s ease;
          background: #f8fafc;
        "
        onfocus="
          this.style.borderColor = '#3b82f6';
          this.style.background = '#fff';
          this.style.boxShadow = '0 0 0 3px rgba(59,130,246,0.1)';
        "
        onblur="
          this.style.borderColor = '#cbd5e1';
          this.style.background = '#f8fafc';
          this.style.boxShadow = 'none';
        "
      />
    </div>

    <!-- Salary Input Group -->
    <div style="margin-bottom: 32px">
      <label
        style="
          display: block;
          font-size: 13px;
          font-weight: 600;
          margin-bottom: 6px;
          color: #334155;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        "
        >Monthly Salary (INR)</label
      >
      <input
        type="number"
        [(ngModel)]="emp.salary"
        name="salary"
        placeholder="e.g. 50000"
        style="
          width: 100%;
          padding: 11px 16px;
          border: 1px solid #cbd5e1;
          border-radius: 10px;
          font-size: 14px;
          outline: none;
          transition: all 0.2s ease;
          background: #f8fafc;
        "
        [style.border-color]="fieldErrors && fieldErrors.salary ? '#ef4444' : '#cbd5e1'"
        [style.box-shadow]="
          fieldErrors && fieldErrors.salary ? '0 0 0 3px rgba(239,68,68,0.1)' : 'none'
        "
        onfocus="
          this.style.borderColor = '#3b82f6';
          this.style.background = '#fff';
          this.style.boxShadow = '0 0 0 3px rgba(59,130,246,0.1)';
        "
        onblur="
          if (!this.style.borderColor.includes('239')) {
            this.style.borderColor = '#cbd5e1';
            this.style.background = '#f8fafc';
            this.style.boxShadow = 'none';
          }
        "
      />
      <small
        *ngIf="fieldErrors && fieldErrors.salary"
        style="color: #ef4444; display: block; margin-top: 6px; font-size: 13px; font-weight: 600"
      >
        • {{ fieldErrors.salary }}
      </small>
    </div>

    <!-- Interactive Action Buttons Configuration -->
    <div style="display: flex; gap: 12px; align-items: center">
      <button
        type="submit"
        style="
          background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
          color: #ffffff;
          border: none;
          padding: 12px 24px;
          border-radius: 10px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.2s ease;
          flex: 2;
          box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        "
        onmouseover="
          this.style.background = '#059669';
          this.style.transform = 'translateY(-1px)';
        "
        onmouseout="
          this.style.background = '#10b981';
          this.style.transform = 'translateY(0)';
        "
      >
        Save Profile
      </button>
    </div>
  </form>
</div>

<style>
  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(15px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
