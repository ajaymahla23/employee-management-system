<div *ngIf="toastService.toast().visible" 
     [style.background]="toastService.toast().type === 'success' ? '#10b981' : '#ef4444'"
     style="position: fixed; top: 24px; right: 24px; color: white; padding: 16px 24px; border-radius: 10px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); z-index: 9999; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
  <span>{{ toastService.toast().type === 'success' ? '✅' : '❌' }}</span>
  {{ toastService.toast().message }}
</div>

<style>
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
